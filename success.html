<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Demande envoyée - DIGLY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
      padding: 100px 20px;
      line-height: 1.6;
    }
    .success-icon {
      font-size: 4rem;
      color: #10b981;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    p {
      max-width: 600px;
      margin: 0 auto 30px;
    }
    .cta {
      display: inline-block;
      padding: 12px 24px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }
    .cta:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="success-icon">✅</div>
  <h1>Demande envoyée avec succès !</h1>
  <p>
    Merci pour votre intérêt. Votre demande a été enregistrée et sera traitée dans les plus brefs délais.
    Vous recevrez une réponse personnalisée sous 48h ouvrées.
  </p>
  <a href="/" class="cta">Retour à l'accueil</a>
</body>
</html>
